# Netlify config for the supervisor approval PWA (Git-connected deploys).
[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Payroll send at 11:00 NZ. Runs at both UTC hours that can be 11am NZ (DST);
# the function only proceeds when it's actually 11am NZ, and only for sites whose
# pay week closed the day before.
[functions."scheduled-payroll"]
  schedule = "0 22,23 * * *"

# Reminder to approvers at 09:00 NZ (2 hours before the send). Same DST handling.
[functions."payroll-reminder"]
  schedule = "0 20,21 * * *"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
