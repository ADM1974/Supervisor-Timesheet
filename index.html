<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#a4161a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Approvals">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Timesheet Approvals</title>
<style>
  :root{
    --brand:#a4161a;--brand-dark:#7a1015;--bg:#f5efef;--card:#ffffff;--ink:#1f2329;--muted:#6a7280;--line:#e8e0e0;
    --amber:#b86e00;--green:#0f7b3f;--red:#b3261e;
  }
  *{box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100%;position:relative;}
  .appbar{background:var(--brand);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 16px 14px;display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  .appbar .ttl{font-size:16px;font-weight:600;flex:1;}
  .appbar .user{font-size:11px;background:rgba(255,255,255,.22);padding:4px 9px;border-radius:20px;cursor:pointer;}
  .body{flex:1;overflow-y:auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 100px);max-width:560px;width:100%;margin:0 auto;-webkit-overflow-scrolling:touch;}
  .body::-webkit-scrollbar{width:0;}
  .sh{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin:2px 2px 4px;}
  .meta{color:var(--muted);font-size:12px;line-height:1.5;}
  .weekhead{margin:2px 2px 12px;}
  .weekhead .rng{font-size:15px;font-weight:600;color:var(--ink);}
  /* ---- approval card ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:13px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .card .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .card .who{font-weight:700;font-size:16px;}
  .card .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .card .gtot{font-weight:700;font-size:15px;color:var(--brand-dark);white-space:nowrap;}
  .dayrow{border-top:1px solid var(--line);padding:8px 0 4px;}
  .dayrow .dn{font-size:12.5px;font-weight:600;color:#3b424b;margin-bottom:4px;}
  .ln{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:2px 0;}
  .ln .wo{color:var(--ink);}
  .ln .hr{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .ln .tag{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--brand-dark);background:#f3e7e7;border-radius:10px;padding:2px 8px;white-space:nowrap;align-self:center;}
  .lncomment{font-size:11.5px;color:var(--muted);font-style:italic;padding:0 0 5px 2px;}
  .payrollbtn{margin-top:12px;width:100%;padding:11px;border:1.5px solid var(--brand);background:#fff;color:var(--brand-dark);border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;}
  .payrollbtn:active{background:#f5efef;}
  .payrollbtn:disabled{opacity:.55;cursor:default;}
  .worow{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:7px 0;font-size:13.5px;}
  .wodel{border:none;background:none;color:var(--red);font-size:15px;cursor:pointer;padding:0 4px;line-height:1;}
  .woadd-lbl{font-size:11.5px;color:var(--muted);margin-top:10px;font-weight:600;}
  .woadd-lbl span{font-weight:400;}
  .wota{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:7px;padding:8px 9px;font-size:13px;font-family:inherit;resize:vertical;margin-top:5px;}
  .acts{display:flex;gap:10px;margin-top:12px;}
  .acts button{flex:1;padding:12px;border-radius:9px;font-size:14.5px;font-weight:600;cursor:pointer;border:1.5px solid transparent;}
  .acts .approve{background:var(--green);color:#fff;}
  .acts .reject{background:#fff;color:var(--red);border-color:var(--red);}
  .acts button:disabled{opacity:.55;cursor:default;}
  .empty{text-align:center;color:var(--muted);font-size:15px;padding:46px 16px;}
  .empty .big{font-size:40px;margin-bottom:8px;}
  .loading{text-align:center;color:var(--muted);font-size:14px;padding:30px 0;}
  .signin{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 18px 22px;box-shadow:0 1px 2px rgba(16,24,40,.04);text-align:center;margin-top:30px;}
  .signin .logo{width:64px;height:64px;border-radius:16px;margin:2px auto 14px;display:block;}
  .signin h2{font-size:18px;font-weight:600;margin:0 0 6px;}
  .signin .ms{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;margin-top:18px;background:#fff;border:1px solid #cdd3da;border-radius:8px;font-size:15px;font-weight:600;color:#1f2329;cursor:pointer;}
  .signin .ms:hover{background:#f4f7fb;}
  .signin .ms .g{display:inline-grid;grid-template-columns:1fr 1fr;gap:2px;width:18px;height:18px;}
  .signin .ms .g i{display:block;width:8px;height:8px;}
  .signin .err{color:var(--red);font-size:13px;min-height:18px;margin-top:12px;}
  .signin .foot{font-size:11px;color:var(--muted);margin-top:14px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 28px);background:#1f2329;color:#fff;padding:11px 18px;border-radius:24px;font-size:13.5px;opacity:0;transition:opacity .25s;pointer-events:none;text-align:center;max-width:320px;z-index:30;}
  .toast.show{opacity:.96;}
  .verbadge{position:fixed;left:calc(env(safe-area-inset-left) + 14px);bottom:calc(env(safe-area-inset-bottom) + 14px);z-index:40;background:rgba(31,35,41,.62);color:#fff;font-size:10px;line-height:1;padding:4px 7px;border-radius:10px;letter-spacing:.3px;pointer-events:none;}
  .expirybar{background:#9a6400;color:#fff;font-size:12.5px;line-height:1.45;padding:10px 14px;text-align:center;}
  .expirybar.urgent{background:#b3261e;}
  .expirybar a{color:#fff;text-decoration:underline;font-weight:600;white-space:nowrap;}
  .hidden{display:none !important;}
</style>
</head>
<body>
  <div id="expiryBar" class="expirybar hidden"></div>
  <div class="appbar">
    <span class="ttl">Approvals</span>
    <span class="user hidden" id="who" onclick="signOut()">Sign out</span>
  </div>
  <div id="cdbar" style="display:none;background:#2b2f36;color:#fff;text-align:center;font-size:12.5px;padding:6px 10px;letter-spacing:.3px">⏱ Next payroll send in <b id="cdval" style="font-variant-numeric:tabular-nums">—</b></div>

  <!-- ===== SIGN IN ===== -->
  <div class="body" id="gateBody">
    <div class="signin">
      <img class="logo" src="icons/icon-192.png" alt="">
      <h2>Timesheet approvals</h2>
      <div class="meta">Sign in with your work account to review and approve the timesheets for the sites you supervise.</div>
      <button class="ms" id="msBtn" onclick="signIn()">
        <span class="g"><i style="background:#f25022"></i><i style="background:#7fba00"></i><i style="background:#00a4ef"></i><i style="background:#ffb900"></i></span>
        Sign in with Microsoft
      </button>
      <div class="err" id="signErr"></div>
      <div class="foot" id="signinVer" style="opacity:.55;margin-top:14px"></div>
    </div>
  </div>

  <!-- ===== APPROVALS ===== -->
  <div class="body hidden" id="appView">
    <div class="weekhead" id="head"></div>
    <div id="cards"><div class="loading">Loading approvals…</div></div>
    <div class="foot" style="text-align:center;margin-top:16px"><a href="guide.html" style="color:var(--brand-dark);font-weight:600;text-decoration:none;font-size:12.5px">How the timesheet system works →</a></div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="verbadge" id="verbadge"></div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
<script src="config.js"></script>
<script>
let msalInstance=null, account=null, userName='there', userEmail='', GROUPS=[], SITES=[];
const SCOPES=['openid','profile','email'];

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function firstName(n){return (n||'').trim().split(/\s+/)[0]||'there';}
function dayLabel(date){return new Date(date+'T00:00:00Z').toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short',timeZone:'UTC'});}
function weekRange(weekStart){
  if(!weekStart) return '';
  const start=new Date(weekStart+'T00:00:00Z');
  const end=new Date(start.getTime()+6*86400000);
  const iso=d=>d.toISOString().slice(0,10);
  return dayLabel(iso(start))+' – '+dayLabel(iso(end));
}
function fmtHr(n){const v=Math.round((Number(n)||0)*100)/100;return (Number.isInteger(v)?v.toFixed(1):String(v))+' h';}

/* ---------- Microsoft sign-in ---------- */
(async function init(){
  const cfg=window.SUP_CONFIG||{};
  if(!cfg.clientId || cfg.clientId.indexOf('PASTE')===0){ document.getElementById('signErr').textContent='Sign-in not configured yet (clientId missing in config.js).'; return; }
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{ clientId:cfg.clientId, authority:'https://login.microsoftonline.com/'+cfg.tenantId, redirectUri:window.location.origin },
      cache:{ cacheLocation:'localStorage' }
    });
    await msalInstance.initialize();
    const resp=await msalInstance.handleRedirectPromise();
    account=(resp && resp.account) || msalInstance.getAllAccounts()[0] || null;
    if(account){ msalInstance.setActiveAccount(account); afterSignIn(); }
  }catch(e){ document.getElementById('signErr').textContent='Sign-in error — try again.'; }
})();

async function signIn(){
  if(!msalInstance){ return; }
  try{ await msalInstance.loginRedirect({ scopes:SCOPES }); }
  catch(e){ document.getElementById('signErr').textContent='Couldn’t start sign-in.'; }
}
function signOut(){ if(msalInstance && account){ msalInstance.logoutRedirect({ account }); } }

async function getToken(){
  const res=await msalInstance.acquireTokenSilent({ account, scopes:SCOPES });
  return res.idToken;
}
async function api(path, body){
  const token=await getToken();
  return fetch(path,{ method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: body?JSON.stringify(body):'{}' });
}

function afterSignIn(){
  userName=(account && (account.name || (account.idTokenClaims && account.idTokenClaims.name))) || 'there';
  userEmail=(account && (account.username || (account.idTokenClaims && account.idTokenClaims.preferred_username))) || '';
  document.getElementById('gateBody').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  const chip=document.getElementById('who'); chip.classList.remove('hidden'); chip.textContent=firstName(userName)+' · Sign out';
  loadPending();
}

/* ---------- approvals ---------- */
async function loadPending(){
  document.getElementById('cards').innerHTML='<div class="loading">Loading approvals…</div>';
  try{
    const res=await api('/.netlify/functions/pending',{});
    if(res.status===401){ toast('Please sign in again'); return; }
    const data=await res.json();
    if(!data.ok) throw new Error('load');
    SITES=data.sites||[];
    GROUPS=data.groups||[];
    renderApprovals();
    setCountdown(data.nextSend);
  }catch(e){ document.getElementById('cards').innerHTML='<div class="loading">Couldn’t load approvals — check signal.</div>'; }
}

function renderApprovals(){
  document.getElementById('head').innerHTML=
    `<div class="sh">Hi ${esc(firstName(userName))} — timesheets to approve</div>`+
    (userEmail?`<div class="meta">Signed in as ${esc(userEmail)}</div>`:'')+
    (SITES.length?`<div class="meta">Your sites: ${esc(SITES.join(' · '))} &nbsp;·&nbsp; <a href="#" onclick="event.preventDefault();loadPending()" style="color:var(--brand-dark);font-weight:700;text-decoration:none">↻ Refresh</a></div>`:'')+
    (SITES.length?`<button class="payrollbtn" onclick="sendPayroll('last')">📧 Email last week’s payroll report</button><div style="text-align:center;margin-top:7px"><a href="#" onclick="event.preventDefault();sendPayroll('current')" style="font-size:12px;color:var(--brand-dark)">…or send this week so far (for testing)</a></div><div style="text-align:center;margin-top:10px"><a href="#" onclick="event.preventDefault();loadWorkOrders()" style="font-size:12.5px;color:var(--brand-dark);font-weight:600">🛠 Manage work orders</a></div>`:'');

  const wrap=document.getElementById('cards');

  if(!SITES.length){
    wrap.innerHTML=`<div class="empty"><div class="big">🏗️</div>No sites are linked to <b>${esc(userEmail||'your account')}</b> yet.<br><br>On the Sites list, set <b>ManagerName</b> so it forms this email (first-initial.surname@ael.co), or add a <b>ManagerEmail</b> column with this exact address.</div>`;
    return;
  }
  if(!GROUPS.length){
    wrap.innerHTML=`<div class="empty"><div class="big">✅</div>All caught up — no timesheets waiting.</div>`;
    return;
  }
  wrap.innerHTML=GROUPS.map(cardHtml).join('');
}

function cardHtml(g){
  const days=(g.days||[]).map(d=>{
    const lines=(d.lines||[]).slice().sort((a,b)=>(a.allow?1:0)-(b.allow?1:0)).map(l=> l.allow
      ? `<div class="ln"><span class="wo">${esc(l.allow)}</span><span class="tag">allowance</span></div>`
      : `<div class="ln"><span class="wo">${esc(l.wo||'—')}</span><span class="hr">${fmtHr(l.hr)}</span></div>${l.comment?`<div class="lncomment">${esc(l.comment)}</div>`:''}`).join('');
    return `<div class="dayrow"><div class="dn">${dayLabel(d.date)}</div>${lines}</div>`;
  }).join('');
  return `<div class="card" id="card-${esc(g.key)}">
    <div class="hd">
      <div>
        <div class="who">${esc(g.name)}</div>
        <div class="sub">${esc(g.site||'')}${g.weekStart?' · '+esc(weekRange(g.weekStart)):''}</div>
      </div>
      <div class="gtot">${fmtHr(g.total)}</div>
    </div>
    ${days}
    <div class="acts">
      <button class="approve" onclick="decide('${esc(g.key)}','approve')">Approve</button>
      <button class="reject" onclick="decide('${esc(g.key)}','reject')">Reject</button>
    </div>
  </div>`;
}

/* ---------- manage work orders (per the supervisor's sites) ---------- */
let WO = { sites:[], workOrders:[] };
function woInId(site){ return 'woin_'+String(site).replace(/[^a-z0-9]/gi,'_'); }
async function loadWorkOrders(){
  document.getElementById('head').innerHTML=`<div class="sh">Work orders</div><div class="meta">Add or remove the jobs that appear in the timesheet apps for your sites.</div>`;
  document.getElementById('cards').innerHTML='<div class="loading">Loading…</div>';
  try{
    const res=await api('/.netlify/functions/workorders',{ action:'list' });
    if(res.status===401){ toast('Please sign in again'); return; }
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'load');
    WO=data; renderWorkOrders();
  }catch(e){ document.getElementById('cards').innerHTML='<div class="empty"><div class="big">⚠️</div>Couldn’t load work orders — '+esc((e&&e.message)||'try again')+'</div>'; }
}
function renderWorkOrders(){
  const bySite={};
  (WO.sites||[]).forEach(s=>bySite[s]=[]);
  (WO.workOrders||[]).forEach(w=>{ (bySite[w.site]=bySite[w.site]||[]).push(w); });
  let html=(WO.sites||[]).map(site=>{
    const rows=(bySite[site]||[]).map(w=>`<div class="worow"><span>${esc(w.title)}</span><button class="wodel" onclick="removeWO('${esc(String(w.id))}')" title="Remove">✕</button></div>`).join('')
      || '<div class="meta" style="padding:5px 0 2px">No work orders yet.</div>';
    return `<div class="card"><div class="who">${esc(site)}</div>${rows}
      <div class="woadd-lbl">Add work orders <span>— one per line</span></div>
      <textarea id="${woInId(site)}" class="wota" rows="3" placeholder="WO-1234 — description&#10;WO-5678 — description"></textarea></div>`;
  }).join('');
  html+=`<button class="payrollbtn" id="woSaveBtn" onclick="saveWorkOrders()">＋ Save new work orders</button>`;
  html+=`<button class="payrollbtn" style="margin-top:8px;border-color:var(--line);color:var(--muted)" onclick="loadPending()">← Back to approvals</button>`;
  document.getElementById('cards').innerHTML=html;
}
async function saveWorkOrders(){
  const items=[];
  (WO.sites||[]).forEach(site=>{
    const ta=document.getElementById(woInId(site));
    if(!ta) return;
    ta.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean).forEach(title=>items.push({site,title}));
  });
  if(!items.length){ toast('Type some work orders first — one per line.'); return; }
  const btn=document.getElementById('woSaveBtn'); if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
  try{
    const res=await api('/.netlify/functions/workorders',{ action:'addmany', items });
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'save');
    toast('Added '+data.created+' work order'+(data.created===1?'':'s'));
    loadWorkOrders();
  }catch(e){ toast('Couldn’t save — '+((e&&e.message)||'try again')); if(btn){ btn.disabled=false; btn.textContent='＋ Save new work orders'; } }
}
async function removeWO(id){
  if(!confirm('Remove this work order from the list?')) return;
  try{
    const res=await api('/.netlify/functions/workorders',{ action:'remove', id });
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'remove');
    toast('Removed'); loadWorkOrders();
  }catch(e){ toast('Couldn’t remove — '+((e&&e.message)||'try again')); }
}

async function sendPayroll(which){
  which = which==='current' ? 'current' : 'last';
  const label = which==='current' ? 'THIS week so far' : 'last week';
  if(!confirm('Email '+label+'’s APPROVED hours to payroll for your site(s)? The supervisor is cc’d.')) return;
  const btn=document.querySelector('.payrollbtn'); if(btn){ btn.disabled=true; btn.textContent='Sending…'; }
  try{
    const res=await api('/.netlify/functions/report',{ which });
    if(res.status===401){ toast('Please sign in again'); return; }
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'failed');
    const sent=(data.results||[]).filter(r=>r.sent);
    const none=(data.results||[]).filter(r=>!r.sent);
    if(sent.length){
      toast('Sent to payroll: '+sent.map(r=>`${r.site} (${r.total}h)`).join(', ')+(none.length?' · nothing approved for '+none.map(r=>r.site).join(', '):''));
    } else {
      toast('No approved hours found for last week.');
    }
  }catch(e){ toast('Couldn’t send — '+((e&&e.message)||'try again')); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='📧 Email last week’s payroll report'; } }
}

async function decide(key, action){
  const g=GROUPS.find(x=>x.key===key);
  if(!g) return;
  let reason='';
  if(action==='reject'){
    reason=(prompt('Reason for rejecting '+g.name+'’s timesheet?')||'').trim();
    if(!reason){ return; }
  }
  const card=document.getElementById('card-'+cssId(key));
  const btns=card?card.querySelectorAll('button'):[];
  btns.forEach(b=>b.disabled=true);
  try{
    const res=await api('/.netlify/functions/decide',{ ids:g.ids, action, reason });
    if(res.status===401){ toast('Please sign in again'); btns.forEach(b=>b.disabled=false); return; }
    const data=await res.json();
    if(!data.ok) throw new Error('decide');
    GROUPS=GROUPS.filter(x=>x.key!==key);
    renderApprovals();
    const by=userEmail?(' · by '+userEmail):'';
    toast(action==='approve'?`Approved ${g.name} — ${data.updated} ${data.updated===1?'entry':'entries'}${by}`:`Rejected ${g.name}${by}`);
  }catch(e){ toast('Couldn’t save — check signal and try again'); btns.forEach(b=>b.disabled=false); }
}
function cssId(key){ return String(key).replace(/"/g,'&quot;'); }

/* ---- payroll countdown: time until the next per-site report is emailed to accounts ---- */
let CD_TARGET=null;
function setCountdown(target){ CD_TARGET=target?new Date(target):null; tickCountdown(); }
function tickCountdown(){
  const el=document.getElementById('cdval'), bar=document.getElementById('cdbar');
  if(!bar||!el) return;
  if(!CD_TARGET || isNaN(CD_TARGET.getTime())){ bar.style.display='none'; return; }
  let ms=CD_TARGET.getTime()-Date.now(); if(ms<0) ms=0;
  const d=Math.floor(ms/86400000), h=Math.floor(ms%86400000/3600000), m=Math.floor(ms%3600000/60000);
  el.textContent=d+'d '+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m';
  bar.style.display='';
}
setInterval(tickCountdown,30000);

/* Version badge (shown on every screen) + always-check-for-updates on load */
const APP_VERSION='3.6';
document.getElementById('verbadge').textContent='v'+APP_VERSION;
document.getElementById('signinVer').textContent='Version '+APP_VERSION;

/* Warn (in-app) before the Microsoft client secret expires, so whoever's here
   knows to renew it. Reads SUP_CONFIG.secretExpiry; links to the how-to page. */
function checkSecretExpiry(){
  const exp=(window.SUP_CONFIG||{}).secretExpiry; if(!exp) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((new Date(exp+'T00:00:00')-today)/86400000);
  if(days>30) return;
  const bar=document.getElementById('expiryBar'); if(!bar) return;
  bar.classList.remove('hidden');
  if(days<0){
    bar.classList.add('urgent');
    bar.innerHTML='⚠️ The system security key EXPIRED on '+exp+' — the timesheet apps can’t reach SharePoint. <a href="renew-secret.html" target="_blank" rel="noopener">How to fix it →</a>';
  } else {
    bar.classList.toggle('urgent', days<=7);
    bar.innerHTML='⚠️ System security key expires '+exp+' (in '+days+' day'+(days===1?'':'s')+'). It must be renewed or the timesheet apps will stop working. <a href="renew-secret.html" target="_blank" rel="noopener">How to renew →</a>';
  }
}
checkSecretExpiry();
